<svg viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F7FA;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="glowGradient1Light" cx="20%" cy="20%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="glowGradient2Light" cx="80%" cy="80%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="accentGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="asciiGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284C7;stop-opacity:1">
        <animate attributeName="stop-color" values="#0284C7;#2563EB;#0284C7" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1">
        <animate attributeName="stop-color" values="#2563EB;#0284C7;#2563EB" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Filters -->
    <filter id="glowLight">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlowLight">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="scanlines">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" seed="2" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5" />
    </filter>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0.2" />
    </filter>

    <!-- Mask for text reveal -->
    <mask id="textRevealMaskLight">
      <rect width="1180" height="610" fill="white"/>
      <rect width="0" height="610" fill="black">
        <animate attributeName="width" from="0" to="620" dur="1.2s" begin="0.3s" fill="freeze" />
      </rect>
    </mask>

    <!-- Clip paths -->
    <clipPath id="panelClipLight">
      <rect x="20" y="20" width="1140" height="570" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1180" height="610" fill="url(#bgGradientLight)"/>
  
  <!-- Floating glow orbs -->
  <circle cx="150" cy="100" r="200" fill="url(#glowGradient1Light)">
    <animate attributeName="cy" values="100;120;100" dur="8s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="1050" cy="500" r="250" fill="url(#glowGradient2Light)">
    <animate attributeName="cy" values="500;480;500" dur="10s" repeatCount="indefinite" />
  </circle>

  <!-- Main container -->
  <g clip-path="url(#panelClipLight)">
    <!-- Panel background -->
    <rect x="20" y="20" width="1140" height="570" rx="20" fill="#F8FAFC" stroke="rgba(15,23,42,0.08)" stroke-width="1" opacity="0.95"/>
    
    <!-- Glass reflection -->
    <rect x="20" y="20" width="1140" height="285" rx="20" fill="rgba(255,255,255,0.6)"/>

    <!-- LEFT SECTION - ASCII Art -->
    <g>
      <!-- ASCII Container -->
      <g transform="translate(60, 80)">
        <!-- Floating animation -->
        <animateTransform attributeName="transform" type="translate" 
          values="60,80; 60,85; 60,80" dur="4s" repeatCount="indefinite" additive="sum" />

        <!-- ASCII Portrait (simplified tech-themed design) -->
        <text x="0" y="0" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ╔════════════════╗
        </text>
        <text x="0" y="16" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ║  &lt;/ CODE \&gt;   ║
        </text>
        <text x="0" y="32" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ║ ◆ ● ◆ ● ◆ ║
        </text>
        <text x="0" y="48" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ║ ◆ ◆ ◆ ◆ ◆ ║
        </text>
        <text x="0" y="64" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ║ ◆ ● ◆ ● ◆ ║
        </text>
        <text x="0" y="80" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ╠════════════════╣
        </text>
        <text x="0" y="96" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ║ DEV · BUILD   ║
        </text>
        <text x="0" y="112" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ║ SHIP · REPEAT ║
        </text>
        <text x="0" y="128" font-family="'Courier New', monospace" font-size="11" fill="url(#asciiGradientLight)" font-weight="bold" letter-spacing="2">
          ╚════════════════╝
        </text>

        <!-- Glow effect for ASCII -->
        <g opacity="0.4" filter="url(#softGlowLight)">
          <text x="0" y="0" font-family="'Courier New', monospace" font-size="11" fill="none" stroke="#2563EB" stroke-width="0.5" letter-spacing="2">
            ╔════════════════╗
          </text>
        </g>

        <!-- Scanline animation -->
        <rect x="-10" y="0" width="200" height="3" fill="rgba(2,132,199,0.3)">
          <animate attributeName="y" from="0" to="140" dur="3s" repeatCount="indefinite" />
        </rect>
      </g>

      <!-- Typing indicator -->
      <circle cx="280" cy="240" r="2" fill="#0284C7" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- RIGHT SECTION - Terminal Content -->
    <g transform="translate(450, 80)">
      <!-- Greeting -->
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748B" letter-spacing="0.5">
        Hi 👋
      </text>

      <!-- Main Title with typing effect -->
      <text x="0" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#0F172A">
        I'm Ashish
      </text>

      <!-- Typing animation role -->
      <g>
        <text x="0" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="url(#accentGradientLight)" font-weight="600">
          <tspan>Full Stack Developer</tspan>
        </text>
        <circle cx="285" cy="75" r="2" fill="url(#accentGradientLight)">
          <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
        </circle>
      </g>

      <!-- Divider line with glow -->
      <line x1="0" y1="110" x2="280" y2="110" stroke="rgba(37,99,235,0.2)" stroke-width="1">
        <animate attributeName="stroke" values="rgba(37,99,235,0.2);rgba(6,182,212,0.35);rgba(37,99,235,0.2)" dur="4s" repeatCount="indefinite" />
      </line>

      <!-- Info items with sequential reveal -->
      <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.6s" fill="freeze" />
        
        <text x="0" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B" letter-spacing="0.3">
          📍 India
        </text>
        
        <text x="0" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B" letter-spacing="0.3">
          🎓 Computer Science
        </text>
        
        <text x="0" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B" letter-spacing="0.3">
          ⚡ Building scalable web apps
        </text>
      </g>

      <!-- Skills section -->
      <g transform="translate(0, 240)">
        <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" font-weight="600" letter-spacing="0.5" text-transform="uppercase">
          Skills
        </text>

        <!-- Skill pills -->
        <g transform="translate(0, 25)" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.1s" fill="freeze" />
          
          <!-- React pill -->
          <rect x="0" y="0" width="65" height="28" rx="14" fill="rgba(37,99,235,0.08)" stroke="rgba(37,99,235,0.25)" stroke-width="1">
            <animate attributeName="stroke-width" values="1;1.5;1" dur="3s" repeatCount="indefinite" />
          </rect>
          <text x="32.5" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1E40AF" text-anchor="middle" font-weight="500">
            React
          </text>

          <!-- TypeScript pill -->
          <rect x="75" y="0" width="85" height="28" rx="14" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.25)" stroke-width="1">
            <animate attributeName="stroke-width" values="1;1.5;1" dur="3.2s" begin="0.2s" repeatCount="indefinite" />
          </rect>
          <text x="117.5" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0C4A6E" text-anchor="middle" font-weight="500">
            TypeScript
          </text>

          <!-- Node.js pill -->
          <rect x="170" y="0" width="70" height="28" rx="14" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1">
            <animate attributeName="stroke-width" values="1;1.5;1" dur="3.4s" begin="0.4s" repeatCount="indefinite" />
          </rect>
          <text x="205" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#065F46" text-anchor="middle" font-weight="500">
            Node.js
          </text>

          <!-- Next.js pill -->
          <rect x="250" y="0" width="65" height="28" rx="14" fill="rgba(37,99,235,0.08)" stroke="rgba(37,99,235,0.25)" stroke-width="1">
            <animate attributeName="stroke-width" values="1;1.5;1" dur="3s" begin="0.6s" repeatCount="indefinite" />
          </rect>
          <text x="282.5" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1E40AF" text-anchor="middle" font-weight="500">
            Next.js
          </text>

          <!-- Second row -->
          <!-- Python pill -->
          <rect x="0" y="40" width="65" height="28" rx="14" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.25)" stroke-width="1">
            <animate attributeName="stroke-width" values="1;1.5;1" dur="3.2s" begin="0.8s" repeatCount="indefinite" />
          </rect>
          <text x="32.5" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0C4A6E" text-anchor="middle" font-weight="500">
            Python
          </text>

          <!-- Docker pill -->
          <rect x="75" y="40" width="65" height="28" rx="14" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1">
            <animate attributeName="stroke-width" values="1;1.5;1" dur="3.4s" begin="1s" repeatCount="indefinite" />
          </rect>
          <text x="107.5" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#065F46" text-anchor="middle" font-weight="500">
            Docker
          </text>

          <!-- PostgreSQL pill -->
          <rect x="150" y="40" width="90" height="28" rx="14" fill="rgba(37,99,235,0.08)" stroke="rgba(37,99,235,0.25)" stroke-width="1">
            <animate attributeName="stroke-width" values="1;1.5;1" dur="3s" begin="1.2s" repeatCount="indefinite" />
          </rect>
          <text x="195" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1E40AF" text-anchor="middle" font-weight="500">
            PostgreSQL
          </text>

          <!-- AWS pill -->
          <rect x="250" y="40" width="55" height="28" rx="14" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.25)" stroke-width="1">
            <animate attributeName="stroke-width" values="1;1.5;1" dur="3.2s" begin="1.4s" repeatCount="indefinite" />
          </rect>
          <text x="277.5" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0C4A6E" text-anchor="middle" font-weight="500">
            AWS
          </text>
        </g>
      </g>

      <!-- Social Icons -->
      <g transform="translate(0, 420)" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.5s" fill="freeze" />

        <!-- GitHub Icon -->
        <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(37,99,235,0.3)" stroke-width="1">
          <animate attributeName="stroke" values="rgba(37,99,235,0.3);rgba(37,99,235,0.6);rgba(37,99,235,0.3)" dur="3s" repeatCount="indefinite" />
        </circle>
        <text x="20" y="24" font-family="Arial" font-size="16" fill="#1E40AF" text-anchor="middle" font-weight="bold">
          🐙
        </text>

        <!-- LinkedIn Icon -->
        <circle cx="70" cy="20" r="18" fill="none" stroke="rgba(6,182,212,0.3)" stroke-width="1">
          <animate attributeName="stroke" values="rgba(6,182,212,0.3);rgba(6,182,212,0.6);rgba(6,182,212,0.3)" dur="3.2s" begin="0.2s" repeatCount="indefinite" />
        </circle>
        <text x="70" y="24" font-family="Arial" font-size="16" fill="#0C4A6E" text-anchor="middle" font-weight="bold">
          💼
        </text>

        <!-- Twitter Icon -->
        <circle cx="120" cy="20" r="18" fill="none" stroke="rgba(16,185,129,0.3)" stroke-width="1">
          <animate attributeName="stroke" values="rgba(16,185,129,0.3);rgba(16,185,129,0.6);rgba(16,185,129,0.3)" dur="3.4s" begin="0.4s" repeatCount="indefinite" />
        </circle>
        <text x="120" y="24" font-family="Arial" font-size="16" fill="#065F46" text-anchor="middle" font-weight="bold">
          𝕏
        </text>

        <!-- Portfolio Icon -->
        <circle cx="170" cy="20" r="18" fill="none" stroke="rgba(37,99,235,0.3)" stroke-width="1">
          <animate attributeName="stroke" values="rgba(37,99,235,0.3);rgba(37,99,235,0.6);rgba(37,99,235,0.3)" dur="3s" begin="0.6s" repeatCount="indefinite" />
        </circle>
        <text x="170" y="24" font-family="Arial" font-size="16" fill="#1E40AF" text-anchor="middle" font-weight="bold">
          🌐
        </text>
      </g>
    </g>
  </g>

  <!-- Border shimmer effect -->
  <rect x="20" y="20" width="1140" height="570" rx="20" fill="none" stroke="url(#accentGradientLight)" stroke-width="1" opacity="0.25">
    <animate attributeName="stroke-dasharray" values="0,2260; 2260,0" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Floating particles -->
  <circle cx="100" cy="100" r="1" fill="#0284C7" opacity="0.2">
    <animate attributeName="cy" values="100;50;100" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite" />
  </circle>

  <circle cx="1000" cy="300" r="1.5" fill="#06B6D4" opacity="0.15">
    <animate attributeName="cy" values="300;450;300" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="7s" repeatCount="indefinite" />
  </circle>

  <circle cx="300" cy="500" r="1" fill="#2563EB" opacity="0.18">
    <animate attributeName="cy" values="500;200;500" dur="6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.18;0.45;0.18" dur="6s" repeatCount="indefinite" />
  </circle>
</svg>